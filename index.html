<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Physics Mastery Reviewer</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --danger: #dc2626;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #app {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1, h2, h3 { text-align: center; color: var(--text-main); }
        .hidden { display: none !important; }
        
        /* Login */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { padding: 12px; font-size: 16px; border: 2px solid #e2e8f0; border-radius: 8px; outline: none; }
        input[type="text"]:focus { border-color: var(--primary); }
        button {
            padding: 12px 20px; font-size: 16px; font-weight: bold; color: white;
            background-color: var(--primary); border: none; border-radius: 8px;
            cursor: pointer; transition: background-color 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        
        /* Home Screen */
        .topic-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .topic-btn {
            display: flex; justify-content: space-between; align-items: center;
            background-color: #f1f5f9; color: var(--text-main); border: 2px solid #e2e8f0;
            text-align: left; padding: 15px 20px;
        }
        .topic-btn:hover { background-color: #e2e8f0; border-color: #cbd5e1; }
        .topic-btn.completed { border-color: var(--success); background-color: #f0fdf4; }
        .check-icon { color: var(--success); font-weight: bold; font-size: 18px; display: none; }
        .topic-btn.completed .check-icon { display: inline; }

        /* Quiz Area */
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 20px; color: var(--text-muted); font-weight: bold; }
        .question-box { font-size: 18px; line-height: 1.5; margin-bottom: 25px; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: #f8fafc; border: 2px solid #e2e8f0; padding: 15px; border-radius: 8px;
            text-align: left; cursor: pointer; font-size: 16px; transition: all 0.2s;
            color: var(--text-main); display: flex; align-items: center;
        }
        .option-btn:hover:not(:disabled) { border-color: var(--primary); background: #eff6ff; }
        .option-btn.correct { border-color: var(--success); background: #f0fdf4; color: #166534; }
        .option-btn.wrong { border-color: var(--danger); background: #fef2f2; color: #991b1b; }
        .option-btn:disabled { cursor: default; }

        /* Feedback */
        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 16px; line-height: 1.6; }
        .feedback-box.correct { background: #dcfce7; border: 1px solid var(--success); color: #166534; }
        .feedback-box.wrong { background: #fee2e2; border: 1px solid var(--danger); color: #991b1b; }
        
        .gresa-block { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.7); border-radius: 6px; font-family: monospace; font-size: 14px; }
        .gresa-block strong { color: var(--primary); }

        .actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
    </style>
</head>
<body>

<div id="app">
    <!-- Login Screen -->
    <div id="login-screen">
        <h1>Physics Mastery Reviewer</h1>
        <p style="text-align: center; color: var(--text-muted);">Enter a username to track your progress.</p>
        <div class="input-group">
            <input type="text" id="username-input" placeholder="Enter your username...">
            <button onclick="login()">Start Learning</button>
        </div>
    </div>

    <!-- Home Screen -->
    <div id="home-screen" class="hidden">
        <h2>Welcome, <span id="display-username"></span>!</h2>
        <p style="text-align: center;">Select a topic to review. Conceptual needs 9/15 to clear. Problem Solving is endless practice!</p>
        <div class="topic-list" id="topic-list">
            <!-- Dynamically populated -->
        </div>
        <button onclick="logout()" style="margin-top: 30px; background: var(--text-muted); width: 100%;">Log Out</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <div class="status-bar">
            <span id="topic-title">Topic</span>
            <span id="progress-text">Question 1/15</span>
        </div>
        <div class="question-box" id="question-text">Question goes here?</div>
        <div class="options-grid" id="options-container">
            <!-- Options dynamically populated -->
        </div>
        <div id="feedback-container" class="feedback-box hidden"></div>
        <div class="actions">
            <button id="finish-ps-btn" class="hidden" style="background: var(--success);" onclick="finishProblemSolving()">Mark Topic as Complete & Return</button>
            <button id="next-btn" class="hidden" onclick="nextQuestion()">Next Question</button>
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
        <h2 id="result-title">Topic Finished!</h2>
        <p id="result-message" style="text-align: center; font-size: 18px;"></p>
        <div style="display: flex; justify-content: center; margin-top: 20px;">
            <button onclick="returnHome()">Return to Home</button>
        </div>
    </div>
</div>

<script>
/* ================= DATA & GENERATORS ================= */
const g = 9.8;

// Helper: Random float between min and max
function rand(min, max) { return Math.random() * (max - min) + min; }
// Helper: Random integer
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
// Helper: Shuffle array
function shuffle(array) { return array.sort(() => Math.random() - 0.5); }
// Helper: Pad text to make options visually equal length
function formatDistractor(text) { return text; } // Simplified, will structure naturally equal strings.

/* --- TOPIC 1: Laws of Motion (Conceptual) --- */
const lom_conceptual = [
    { q: "Where do the fundamental Laws of Motion trace their historical origins?", 
      opts: [{t:"Published by Isaac Newton in his book Principia in 1687.", c:true, r:"Correct! Newton formalized these laws in his foundational work, the Principia, revolutionizing physics."},
             {t:"Published by Albert Einstein in his relativity papers in 1905.", c:false, r:"Incorrect. Einstein's work came much later and focused on relativity, not the fundamental classical laws of motion."},
             {t:"Discovered by Galileo Galilei during his telescope experiments.", c:false, r:"Incorrect. While Galileo studied gravity and kinematics, Newton compiled the three official laws of motion."},
             {t:"Created by Aristotle to explain why heavy objects fall faster.", c:false, r:"Incorrect. Aristotle's ideas were actually proven wrong by later scientists like Galileo and Newton."}] },
    { q: "How many fundamental laws of motion did Sir Isaac Newton establish?",
      opts: [{t:"Exactly three fundamental laws of motion.", c:true, r:"Correct! Newton's framework rests strictly on Three Laws: Inertia, F=ma, and Action-Reaction."},
             {t:"Exactly four fundamental laws of motion.", c:false, r:"Incorrect. There are only three laws. The fourth concept often studied is the Law of Universal Gravitation, which is separate."},
             {t:"Exactly two fundamental laws of motion.", c:false, r:"Incorrect. There are three laws. You might be missing the Law of Action-Reaction."},
             {t:"Exactly one fundamental law of motion.", c:false, r:"Incorrect. Motion is governed by three distinct laws, not just one universal rule."}] },
    { q: "Which statement best provides the scientific definition of motion?",
      opts: [{t:"A continuous change in position of an object relative to a reference point.", c:true, r:"Correct! Motion requires a change in location over time compared to a fixed background."},
             {t:"The absolute speed an object travels regardless of its surroundings.", c:false, r:"Incorrect. Motion is always relative to a reference point; absolute speed without context doesn't define motion fully."},
             {t:"The measurement of how heavy an object feels when it is being pushed.", c:false, r:"Incorrect. This describes force and mass, not the act of changing position (motion)."},
             {t:"The natural state of all objects unless they are completely frozen solid.", c:false, r:"Incorrect. Motion is not a 'natural state' dependent on temperature, but rather a mechanical change in position."}] },
    { q: "What does Newton's First Law (The Law of Inertia) fundamentally state?",
      opts: [{t:"An object keeps its current state of motion unless acted upon by a net force.", c:true, r:"Correct! Objects want to keep doing what they are already doing unless forced to change."},
             {t:"An object's acceleration is directly proportional to the applied net force.", c:false, r:"Incorrect. This is the definition of Newton's Second Law, not the First Law (Inertia)."},
             {t:"Every action has an equal and opposite reaction force in nature.", c:false, r:"Incorrect. This is Newton's Third Law, which deals with paired forces, not inertia."},
             {t:"The total momentum of a closed system remains constant over time.", c:false, r:"Incorrect. This is the Law of Conservation of Momentum, not the Law of Inertia."}] },
    { q: "How is 'inertia' best understood in terms of physical movement?",
      opts: [{t:"It is the natural resistance of an object to any change in its velocity.", c:true, r:"Correct! Inertia is simply an object's 'stubbornness' to speed up, slow down, or turn."},
             {t:"It is the invisible force that pushes objects forward after they are thrown.", c:false, r:"Incorrect. There is no forward force after a throw; inertia just keeps it moving because no force stops it right away."},
             {t:"It is the friction that causes moving objects to eventually slow down.", c:false, r:"Incorrect. Friction is an external force. Inertia is an internal property related to mass."},
             {t:"It is the energy required to lift an object against the pull of gravity.", c:false, r:"Incorrect. Lifting against gravity relates to Work and Potential Energy, not the concept of inertia."}] },
    { q: "Which real-world scenario perfectly illustrates the concept of inertia?",
      opts: [{t:"Passengers in a moving car lurch forward when the driver suddenly hits the brakes.", c:true, r:"Correct! The passengers' bodies want to keep moving forward at the car's original speed due to inertia."},
             {t:"A heavy box is much harder to slide across a rough carpet than a smooth floor.", c:false, r:"Incorrect. This illustrates friction, not inertia. Inertia depends on mass, not surface roughness."},
             {t:"A rocket launching upward by pushing exhaust gases forcefully downward.", c:false, r:"Incorrect. This is a classic example of Newton's Third Law (Action-Reaction), not inertia."},
             {t:"A dropped ball speeding up continuously as it falls toward the ground.", c:false, r:"Incorrect. This shows acceleration due to gravity (Second Law), not the tendency to maintain constant motion (inertia)."}] },
    { q: "According to Newton's Second Law, how are force, mass, and acceleration related?",
      opts: [{t:"Acceleration equals net force divided by mass (a = F/m).", c:true, r:"Correct! The harder you push, the faster it accelerates. The heavier it is, the less it accelerates."},
             {t:"Acceleration equals mass divided by the applied net force (a = m/F).", c:false, r:"Incorrect. If you divide mass by force, acceleration would decrease with more force, which doesn't make sense."},
             {t:"Force equals mass divided by acceleration (F = m/a).", c:false, r:"Incorrect. Force is the product of mass and acceleration (F = m * a), not the quotient."},
             {t:"Mass equals force multiplied by acceleration (m = F * a).", c:false, r:"Incorrect. Mass is Force divided by acceleration (m = F/a)."}] },
    { q: "If the net force on an object is kept constant, what happens if its mass is decreased?",
      opts: [{t:"The object's acceleration will noticeably increase.", c:true, r:"Correct! Less mass means less inertia (less resistance). With the same push, a lighter object accelerates faster."},
             {t:"The object's acceleration will noticeably decrease.", c:false, r:"Incorrect. Decreasing the mass makes the object easier to move, so it will accelerate more, not less."},
             {t:"The object's acceleration will remain exactly the same.", c:false, r:"Incorrect. Acceleration is dependent on mass. Changing mass must change acceleration if force is constant."},
             {t:"The object will immediately stop moving entirely.", c:false, r:"Incorrect. Decreasing mass while applying force will not stop it; it will cause it to speed up even faster."}] },
    { q: "If the mass of an object is kept constant, what happens if the applied force increases?",
      opts: [{t:"The object's acceleration will proportionally increase.", c:true, r:"Correct! Because F=ma, a bigger push on the same object results in a bigger acceleration."},
             {t:"The object's acceleration will proportionally decrease.", c:false, r:"Incorrect. A stronger push does not cause an object to accelerate less."},
             {t:"The object's inertia will increase to resist the force.", c:false, r:"Incorrect. Inertia only depends on mass. Since mass is constant, inertia stays exactly the same."},
             {t:"The object will reach a state of perfect equilibrium.", c:false, r:"Incorrect. Equilibrium means zero acceleration. Increasing the net force takes it further from equilibrium."}] },
    { q: "What is the core principle of Newton's Third Law of Motion?",
      opts: [{t:"For every action force, there is an equal and opposite reaction force.", c:true, r:"Correct! Forces always exist in pairs. If A pushes B, B pushes A equally and oppositely."},
             {t:"An object at rest will stay at rest until an unbalanced force applies.", c:false, r:"Incorrect. This describes Newton's First Law (Inertia), not the Third Law."},
             {t:"The larger the mass of an object, the stronger its gravitational pull.", c:false, r:"Incorrect. This relates to Newton's Law of Universal Gravitation, not the Third Law of Motion."},
             {t:"Energy cannot be created or destroyed, only transferred between forms.", c:false, r:"Incorrect. This is the Law of Conservation of Energy, completely different from the Third Law of Motion."}] },
    { q: "Which of the following is an accurate real-world example of action and reaction?",
      opts: [{t:"A swimmer pushing the water backward to propel their body forward.", c:true, r:"Correct! The swimmer pushes water back (action), and the water pushes the swimmer forward (reaction)."},
             {t:"A car turning a sharp corner and passengers leaning to the outside.", c:false, r:"Incorrect. The passengers leaning is due to their inertia (First Law), wanting to move in a straight line."},
             {t:"A heavy bowling ball knocking down lightweight wooden pins.", c:false, r:"Incorrect. While forces are exchanged, simply stating the heavy ball knocks pins is more a demonstration of momentum and F=ma."},
             {t:"A bicycle slowing down as it rolls over a patch of thick mud.", c:false, r:"Incorrect. This is an example of friction acting as a net force to decelerate the bike (Second Law)."}] },
    { q: "In physics, what defines a state of mechanical equilibrium?",
      opts: [{t:"The condition where the net force acting on an object is exactly zero.", c:true, r:"Correct! In equilibrium, all forces balance out, meaning the object has zero acceleration (it's still, or moving steadily)."},
             {t:"The condition where an object moves at the highest possible speed.", c:false, r:"Incorrect. Equilibrium is about balanced forces, not maximum speed. Terminal velocity is a specific type of equilibrium, but max speed is not the definition."},
             {t:"The condition where no forces whatsoever are touching the object.", c:false, r:"Incorrect. Forces like gravity are always acting. Equilibrium just means these forces cancel each other out."},
             {t:"The condition where an object is completely devoid of any mass.", c:false, r:"Incorrect. Massless objects do not define mechanical equilibrium. Equilibrium requires balanced forces on a mass."}] },
    { q: "How is the concept of inertia directly applied to community safety?",
      opts: [{t:"Designing seatbelts to stop passengers from continuing forward during a crash.", c:true, r:"Correct! The car stops, but your body wants to keep moving (inertia). Seatbelts provide the outside force to stop you safely."},
             {t:"Installing brighter streetlights to improve driver visibility at night.", c:false, r:"Incorrect. This improves optics and perception, but has nothing to do with the physical property of inertia."},
             {t:"Adding extra weight to vehicles so they consume less fuel on highways.", c:false, r:"Incorrect. Extra weight actually increases fuel consumption, and this doesn't directly relate to safety via inertia."},
             {t:"Paving roads with smoother materials to reduce tire friction and wear.", c:false, r:"Incorrect. This involves managing friction, not managing the dangers of passenger inertia during stops."}] },
    { q: "How do structural engineers apply Newton's Third Law in building design?",
      opts: [{t:"By ensuring support beams push up with the exact force the roof pushes down.", c:true, r:"Correct! To prevent collapse, the upward reaction force of the pillars must equally match the downward action force of the roof's weight."},
             {t:"By making buildings extremely light so wind cannot easily blow them away.", c:false, r:"Incorrect. Lighter buildings are actually more easily affected by wind. This also doesn't describe an action-reaction pair."},
             {t:"By adding slippery surfaces to the foundation to allow earthquake sliding.", c:false, r:"Incorrect. While base isolation exists, it relates to absorbing kinetic energy, not specifically the action-reaction balance of static loads."},
             {t:"By painting the exterior with materials that reflect solar radiation.", c:false, r:"Incorrect. Reflecting light involves thermodynamics and optics, completely unrelated to Newton's Third Law."}] },
    { q: "A book rests on a table. Which law explains why the book doesn't fall through?",
      opts: [{t:"Newton's Third Law: The table exerts an upward reaction force equal to the book's weight.", c:true, r:"Correct! Gravity pulls the book down (action), and the rigid table pushes back up equally (reaction)."},
             {t:"Newton's First Law: The book's inertia is greater than the force of gravity.", c:false, r:"Incorrect. Inertia is resistance to change in motion, but it is the table's structural push that actively stops the fall."},
             {t:"Newton's Second Law: The book lacks sufficient mass to break the table.", c:false, r:"Incorrect. While it lacks mass to break it, the specific mechanism of 'not falling through' is the equal upward reaction force."},
             {t:"Law of Conservation of Energy: The book has zero kinetic energy.", c:false, r:"Incorrect. Zero kinetic energy means it isn't moving, but doesn't explain the forces preventing it from moving downward."}] }
];

/* --- TOPIC 3: Work, Power, Energy (Conceptual) --- */
const wpe_conceptual = [
    { q: "What is the scientific definition of work in the field of physics?",
      opts: [{t:"Work is the product of force exerted and the displacement in the force's direction.", c:true, r:"Correct! Work (W = Fd) requires a force to successfully move an object some distance."},
             {t:"Work is the total amount of physical effort exerted by a person or machine.", c:false, r:"Incorrect. In physics, if nothing moves, no work is done, regardless of how much effort you feel you exerted."},
             {t:"Work is the measure of how fast an object consumes its potential energy.", c:false, r:"Incorrect. The rate of consuming energy is related to Power, not the definition of Work."},
             {t:"Work is the opposing force of friction acting against a moving object.", c:false, r:"Incorrect. Friction is a force, but Work is the outcome of a force causing displacement."}] },
    { q: "Under what specific condition is zero work done on an object?",
      opts: [{t:"When the applied force is exactly perpendicular to the direction of displacement.", c:true, r:"Correct! Since W = Fd cos(θ), if the angle is 90 degrees, cos(90) = 0, meaning zero work is done."},
             {t:"When an object is pushed constantly and moves at a very high velocity.", c:false, r:"Incorrect. If it is being pushed and moving in that direction, positive work is being done."},
             {t:"When the applied force and the displacement are in the exact same direction.", c:false, r:"Incorrect. This is the condition for MAXIMUM positive work, not zero work."},
             {t:"When the mass of the moving object is extremely large and heavy.", c:false, r:"Incorrect. Mass doesn't dictate zero work. If a force moves a heavy mass, work is still done."}] },
    { q: "How is 'power' defined in physics, and what is its mathematical relationship?",
      opts: [{t:"Power is the rate at which work is done over time (P = W/t).", c:true, r:"Correct! Power measures how fast energy is transferred or work is completed."},
             {t:"Power is the total accumulated energy inside an object (P = W*t).", c:false, r:"Incorrect. Power is a rate (divided by time), not an accumulation (multiplied by time)."},
             {t:"Power is the maximum force an object can withstand before breaking.", c:false, r:"Incorrect. That describes material strength or stress tolerance, not mechanical power."},
             {t:"Power is the distance traveled divided by the force applied (P = d/F).", c:false, r:"Incorrect. Power is Work divided by time, not distance divided by force."}] },
    { q: "What is the primary fundamental difference between work and power?",
      opts: [{t:"Work measures energy transferred, while power measures how fast it transfers.", c:true, r:"Correct! Doing 100 Joules of work is the same whether it takes 1 second or 1 hour. Power accounts for the time difference."},
             {t:"Work only applies to human effort, while power only applies to machines.", c:false, r:"Incorrect. Both concepts apply universally to humans, machines, and natural forces alike."},
             {t:"Work requires movement, but power can be generated by stationary objects.", c:false, r:"Incorrect. Since Power requires Work, and Work requires movement, stationary objects cannot generate mechanical power."},
             {t:"Work is measured in Watts, whereas power is measured in Joules.", c:false, r:"Incorrect. You have the units flipped. Work is in Joules, Power is in Watts."}] },
    { q: "Which statement best summarizes the Law of Conservation of Energy?",
      opts: [{t:"Energy cannot be created or destroyed, only transformed from one form to another.", c:true, r:"Correct! The total energy in a closed system remains perfectly constant, just changing identities."},
             {t:"Energy is constantly being consumed and lost forever as heat in the universe.", c:false, r:"Incorrect. Heat is a form of energy. It disperses, but it is not 'lost' from existence."},
             {t:"The total energy of an object increases proportionally as it moves faster.", c:false, r:"Incorrect. Kinetic energy increases, but total energy remains constant if no external work is added."},
             {t:"Energy naturally decreases over time until an object comes to a complete stop.", c:false, r:"Incorrect. Energy doesn't disappear; it just transforms into other forms like thermal energy via friction."}] },
    { q: "What is the definition and correct formula for kinetic energy?",
      opts: [{t:"The energy an object possesses due to its motion, calculated as KE = ½mv².", c:true, r:"Correct! Any moving object has kinetic energy dependent on its mass and the square of its velocity."},
             {t:"The energy stored based on height, calculated as KE = mgh.", c:false, r:"Incorrect. That is the definition and formula for Gravitational Potential Energy, not Kinetic."},
             {t:"The energy required to stop a moving object, calculated as KE = Fd.", c:false, r:"Incorrect. While stopping requires Work (Fd), the inherent energy of motion is KE = ½mv²."},
             {t:"The energy created by vibrating molecules, calculated as KE = mc².", c:false, r:"Incorrect. mc² is Einstein's mass-energy equivalence, and vibrating molecules relate to thermal energy."}] },
    { q: "What is the definition and correct formula for gravitational potential energy?",
      opts: [{t:"Energy stored due to an object's elevated position, calculated as PE = mgh.", c:true, r:"Correct! The higher you lift an object against gravity, the more potential energy it stores."},
             {t:"Energy generated by the Earth's magnetic field, calculated as PE = ½mv².", c:false, r:"Incorrect. ½mv² is kinetic energy. PE is based on gravity, not magnetism."},
             {t:"Energy lost when an object falls to the ground, calculated as PE = W/t.", c:false, r:"Incorrect. W/t is the formula for Power, not Potential Energy."},
             {t:"Energy an object has due to its internal temperature, calculated as PE = Fd.", c:false, r:"Incorrect. Temperature is thermal energy. Fd is Work. Potential energy is mgh."}] },
    { q: "Describe the energy transformations that occur when an apple falls from a tree.",
      opts: [{t:"Potential energy converts into kinetic energy, then into thermal/sound energy on impact.", c:true, r:"Correct! It starts with stored height (PE), speeds up (KE), and hits the ground (Sound/Heat)."},
             {t:"Kinetic energy converts into potential energy, then disappears upon impact.", c:false, r:"Incorrect. It starts with Potential, not Kinetic. Furthermore, energy never disappears."},
             {t:"Thermal energy transforms into kinetic energy, making the apple fall faster.", c:false, r:"Incorrect. The fall is driven by gravity acting on potential energy, not thermal energy."},
             {t:"Potential energy remains constant while kinetic energy continuously increases.", c:false, r:"Incorrect. Because total energy is conserved, PE must decrease as KE increases during the fall."}] },
    { q: "What energy transformation primarily occurs during a car collision?",
      opts: [{t:"Kinetic energy rapidly transforms into thermal energy, sound, and material deformation.", c:true, r:"Correct! The motion energy is forced to change forms, causing the loud crash, heat, and bent metal."},
             {t:"Kinetic energy transforms entirely into gravitational potential energy.", c:false, r:"Incorrect. Unless the car flies straight up into the air, it isn't gaining significant potential energy."},
             {t:"Potential energy converts into chemical energy within the vehicle's engine.", c:false, r:"Incorrect. Collisions don't convert mechanical energy back into gasoline (chemical energy)."},
             {t:"Energy is completely destroyed, which is why the cars come to a dead stop.", c:false, r:"Incorrect. Energy cannot be destroyed. The energy is simply dispersed as heat, sound, and damage."}] },
    { q: "How is work directly related to energy in a physical system?",
      opts: [{t:"Doing work on a system physically changes the total energy of that system.", c:true, r:"Correct! This is the Work-Energy Theorem. Work is simply the process of transferring energy."},
             {t:"Work and energy are exact opposites; increasing one decreases the other.", c:false, r:"Incorrect. They are not opposites. Work adds or removes energy from a system."},
             {t:"Work determines the direction of movement, while energy dictates the speed.", c:false, r:"Incorrect. Force determines direction. Work and energy are scalar quantities (no direction)."},
             {t:"Work is required to create energy from absolutely nothing in a vacuum.", c:false, r:"Incorrect. Energy cannot be created from nothing, according to the Law of Conservation of Energy."}] },
    { q: "How does the concept of power apply to everyday household appliances?",
      opts: [{t:"Appliances with higher power ratings consume electrical energy much faster.", c:true, r:"Correct! A 1000W microwave transforms energy into heat faster than a 500W microwave."},
             {t:"Appliances with higher power ratings always do more total work in a day.", c:false, r:"Incorrect. A low-power lightbulb left on all month does more total work than a high-power blender used for 10 seconds."},
             {t:"Power ratings indicate how heavy the appliance is to lift off the counter.", c:false, r:"Incorrect. Power ratings denote energy usage rates, not physical mass or weight."},
             {t:"Appliances with lower power ratings generate the highest amount of heat.", c:false, r:"Incorrect. High heat generation (like in ovens or heaters) typically requires very high power ratings."}] },
    { q: "Why is the concept of 'work' foundational to industrial processes?",
      opts: [{t:"It allows engineers to calculate the exact energy needed to move heavy materials.", c:true, r:"Correct! Knowing the work required lets industries size their motors, fuel needs, and structural supports."},
             {t:"It ensures that factory machines operate without any friction or heat loss.", c:false, r:"Incorrect. Friction and heat loss are inevitable in real machines; calculating work doesn't prevent them."},
             {t:"It provides a way to create unlimited energy for mass production lines.", c:false, r:"Incorrect. Unlimited energy is physically impossible. Work is just the transfer of existing energy."},

/* --- PROBLEM SOLVING GENERATORS --- */

function formatGresa(given, req, eq, sub, ans) {
    return `<div class="gresa-block">
        <strong>Given:</strong> ${given}<br>
        <strong>Required:</strong> ${req}<br>
        <strong>Equation:</strong> ${eq}<br>
        <strong>Substitution:</strong> ${sub}<br>
        <strong>Answer:</strong> ${ans}
    </div>`;
}

// Topic 2 Generators: Laws of Motion PS
const lom_ps_gens = [
    // 1. Crate pulled at an angle
    function() {
        let m = randInt(10, 50);
        let theta = randInt(20, 45);
        let muk = (randInt(1, 5) / 10).toFixed(1);
        let T;
        let N, Fx, Fy, fk, a;
        
        // Ensure valid pull that doesn't lift crate and provides positive acceleration
        do {
            T = randInt(100, 300);
            Fx = T * Math.cos(theta * Math.PI / 180);
            Fy = T * Math.sin(theta * Math.PI / 180);
            N = m * g - Fy;
            fk = muk * N;
            a = (Fx - fk) / m;
        } while (N <= 0 || a <= 0.1);

        let correctAns = a.toFixed(2);
        let wrong1 = (Fx / m).toFixed(2); // forgot friction
        let wrong2 = ((Fx - (muk * m * g)) / m).toFixed(2); // used mg for normal force
        let wrong3 = ((Fy - fk) / m).toFixed(2); // swapped sin/cos

        let q = `A ${m}-kg crate starting from rest is pulled across a rough floor by a rope at ${theta}° above the horizontal. The tension is ${T} N, and the coefficient of kinetic friction is ${muk}. Resolve the tension into components and find the horizontal acceleration.`;
        
        let gresa = formatGresa(
            `m = ${m} kg, θ = ${theta}°, T = ${T} N, μ_k = ${muk}, g = 9.8 m/s²`,
            `Horizontal acceleration (a)`,
            `F_x = T cos(θ), F_y = T sin(θ)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;N = mg - F_y<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;f_k = μ_k N<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;a = (F_x - f_k) / m`,

            `${correctAns} m/s²`
        );

        return {

            ]
        };
    },
    // 2. Shop sign suspended by two cables
    function() {
        let m = randInt(20, 80);
        let theta = randInt(30, 60);
        let T = (m * g) / (2 * Math.sin(theta * Math.PI / 180));

        let correctAns = T.toFixed(2);
        let wrong1 = ((m * g) / Math.sin(theta * Math.PI / 180)).toFixed(2); // Forgot the 2 cables
        let wrong2 = ((m * g) / (2 * Math.cos(theta * Math.PI / 180))).toFixed(2); // Used cos instead of sin
        let wrong3 = (m * g).toFixed(2); // Just mg

        );

        return {

        let v = Math.sqrt(2 * g * h);

        let correctAns = `PE = ${PE.toFixed(0)} J, v = ${v.toFixed(2)} m/s`;
        let wrong1 = `PE = ${(m*h).toFixed(0)} J, v = ${(v).toFixed(2)} m/s`; // forgot g in PE
        let wrong2 = `PE = ${PE.toFixed(0)} J, v = ${(Math.sqrt(g*h)).toFixed(2)} m/s`; // forgot 2 in sqrt
        let wrong3 = `PE = ${PE.toFixed(0)} J, v = ${(2*g*h).toFixed(2)} m/s`; // forgot square root

        let q = `A roller coaster car of mass ${m} kg is at the top of a ${h} m hill. Ignore friction. What is its potential energy at the top? What is its speed at the bottom?`;

        let gresa = formatGresa(
            `m = ${m} kg, h = ${h} m, g = 9.8 m/s²`,
            `Potential Energy (PE), Final speed (v)`,
            `PE = mgh,  KE_bottom = PE_top ➔ ½mv² = mgh ➔ v = √(2gh)`,
            `PE = (${m})(9.8)(${h}) = ${PE.toFixed(0)} J<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;v = √(2 * 9.8 * ${h}) = √(${2 * 9.8 * h})`,
            `PE = ${PE.toFixed(0)} J, v = ${v.toFixed(2)} m/s`
        );

        return {
            q: q,
            opts: [
                {t: correctAns, c:true, r:"Correct! You perfectly applied the conservation of mechanical energy." + gresa},
                {t: wrong1, c:false, r:"Incorrect. You forgot to include acceleration due to gravity (g = 9.8) when calculating Potential Energy." + gresa},
                {t: wrong2, c:false, r:"Incorrect. You missed the multiplier 2 in the velocity formula derived from kinetic energy." + gresa},
                {t: wrong3, c:false, r:"Incorrect. You forgot to take the square root to solve for velocity." + gresa}
            ]
        };
    }
];

// Topic 6 Generators: Momentum and Impulse PS
const mi_ps_gens = [
    // 1. Car slows down
    function() {
        let m = randInt(1000, 1500);
        let vi = randInt(40, 70);
        let vf = randInt(10, 25);
        let loss = m * (vi - vf);

        let correctAns = `${loss.toLocaleString()} kg·m/s`;
        let wrong1 = `${(m * vi).toLocaleString()} kg·m/s`; // just initial
        let wrong2 = `${(m * (vi + vf)).toLocaleString()} kg·m/s`; // added instead of subtracted
        let wrong3 = `${((vi - vf)).toLocaleString()} kg·m/s`; // forgot mass

        let q = `A ${m} kg car slows down from ${vi} m/s to ${vf} m/s when approaching a traffic light. How much momentum did the car lose?`;

        let gresa = formatGresa(
            `m = ${m} kg, v_i = ${vi} m/s, v_f = ${vf} m/s`,
            `Lost Momentum (Δp)`,
            `Δp = m(v_i - v_f)`,
            `Δp = ${m} * (${vi} - ${vf})<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Δp = ${m} * ${vi - vf}`,
            `${loss.toLocaleString()} kg·m/s`
        );

        return {
            q: q,
            opts: [
                {t: correctAns, c:true, r:"Correct! The change in momentum is mass times the change in velocity." + gresa},
                {t: wrong1, c:false, r:"Incorrect. That is the initial momentum of the car, not how much it LOST." + gresa},
                {t: wrong2, c:false, r:"Incorrect. You added the velocities together. To find the loss, you must subtract." + gresa},
                {t: wrong3, c:false, r:"Incorrect. You calculated the change in velocity, but forgot to multiply by the mass!" + gresa}
            ]
        };
    },
    // 2. Constant force impulse
    function() {
        let t1 = randInt(2, 6);
        let J1 = randInt(100, 300);
        let t2 = randInt(8, 15);
        let F = J1 / t1;
        let J2 = F * t2;

        let correctAns = `${J2.toFixed(1)} N·s`;
        let wrong1 = `${(J1 * t2).toFixed(1)} N·s`; // forgot to find F first
        let wrong2 = `${(F / t2).toFixed(1)} N·s`; // divided instead of mult
        let wrong3 = `${F.toFixed(1)} N·s`; // answered force instead of impulse

        let q = `A constant force acts on an object for ${t1} seconds, producing an impulse of ${J1} N·s. If the time increases to ${t2} seconds with the SAME force, what will be the new impulse?`;

        let gresa = formatGresa(
            `t_1 = ${t1} s, J_1 = ${J1} N·s, t_2 = ${t2} s`,
            `New Impulse (J_2)`,
            `F = J_1 / t_1,  J_2 = F * t_2`,
            `F = ${J1} / ${t1} = ${F.toFixed(2)} N<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;J_2 = ${F.toFixed(2)} * ${t2}`,
            `${J2.toFixed(1)} N·s`
        );

        return {
            q: q,
            opts: [
                {t: correctAns, c:true, r:"Correct! You found the constant force first, then multiplied by the new time." + gresa},
                {t: wrong1, c:false, r:"Incorrect. You multiplied the old impulse by the new time. You must find the FORCE first." + gresa},
                {t: wrong2, c:false, r:"Incorrect. Impulse is Force MULTIPLIED by time, not divided." + gresa},
                {t: wrong3, c:false, r:"Incorrect. You correctly calculated the Force, but the question asks for the new IMPULSE." + gresa}
            ]
        };
    },
    // 3. Skateboard Collision (Inelastic opposite directions)
    function() {
        let mA = randInt(40, 60);
        let vA = randInt(3, 6); // East (+)
        let mB = randInt(45, 65);
        let vB = randInt(1, 4); // West (-)
        
        let pA = mA * vA;
        let pB = mB * (-vB);
        let pTotal = pA + pB;
        let vf = pTotal / (mA + mB);
        let dir = vf >= 0 ? "East" : "West";
        let speed = Math.abs(vf);

        let correctAns = `${speed.toFixed(2)} m/s ${dir}`;
        let wrong1 = `${((mA*vA + mB*vB)/(mA+mB)).toFixed(2)} m/s East`; // added instead of subtracted vectors
        let wrong2 = `${speed.toFixed(2)} m/s ${dir === "East" ? "West" : "East"}`; // wrong direction
        let wrong3 = `${(pTotal/mA).toFixed(2)} m/s ${dir}`; // forgot to combine mass

        let q = `Two students on skateboards collide and stick together. Student A has a mass of ${mA} kg and moves at ${vA} m/s East. Student B has a mass of ${mB} kg and moves at ${vB} m/s West. What is their final velocity and direction after they stick together?`;

        let gresa = formatGresa(
            `m_A = ${mA} kg, v_A = ${vA} m/s (East,+)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;m_B = ${mB} kg, v_B = -${vB} m/s (West,-)`,
            `Final Velocity (v_f)`,
            `m_A v_A + m_B v_B = (m_A + m_B) v_f`,
            `(${mA})(${vA}) + (${mB})(-${vB}) = (${mA} + ${mB}) v_f<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${pA} - ${Math.abs(pB)} = ${mA + mB} v_f<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${pTotal} = ${mA + mB} v_f<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;v_f = ${pTotal} / ${mA + mB}`,
            `${speed.toFixed(2)} m/s ${dir}`
        );

        return {
            q: q,
            opts: [
                {t: correctAns, c:true, r:"Correct! You accounted for the opposing directions (vectors) and the combined mass." + gresa},
                {t: wrong1, c:false, r:"Incorrect. Momentum is a vector! Since one is going East and the other West, one velocity must be negative." + gresa},
                {t: wrong2, c:false, r:"Incorrect. You have the right speed but the wrong direction. The system moves in the direction of the larger initial momentum." + gresa},
                {t: wrong3, c:false, r:"Incorrect. Because they stick together, you must divide the total momentum by their COMBINED mass, not just one mass." + gresa}
            ]
        };
    },
    // 4. Car crash stationary
    function() {
        let m1 = randInt(1000, 1500);
        let v1 = randInt(15, 25);
        let m2 = randInt(700, 1000);
        let vf = (m1 * v1) / (m1 + m2);

        let correctAns = `${vf.toFixed(2)} m/s North`;
        let wrong1 = `${((m1*v1)/m2).toFixed(2)} m/s North`; // divided by m2
        let wrong2 = `${v1.toFixed(2)} m/s North`; // no change
        let wrong3 = `${vf.toFixed(2)} m/s South`; // wrong dir

        let q = `A ${m1}-kg car moving at ${v1} m/s North crashes into an ${m2}-kg stationary car. They crumple and move together. Find their final velocity and direction.`;

        let gresa = formatGresa(
            `m_1 = ${m1} kg, v_1 = ${v1} m/s (North)<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;m_2 = ${m2} kg, v_2 = 0 m/s`,
            `Final Velocity (v_f)`,
            `m_1 v_1 + m_2 v_2 = (m_1 + m_2) v_f`,
            `(${m1})(${v1}) + 0 = (${m1} + ${m2}) v_f<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${m1*v1} = ${m1+m2} v_f<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;v_f = ${m1*v1} / ${m1+m2}`,
            `${vf.toFixed(2)} m/s North`
        );

        return {
            q: q,
            opts: [
                {t: correctAns, c:true, r:"Correct! The initial momentum of the moving car is distributed perfectly across the new combined mass." + gresa},
                {t: wrong1, c:false, r:"Incorrect. You divided by the stationary car's mass alone. They stuck together, so you must divide by the COMBINED mass." + gresa},
                {t: wrong2, c:false, r:"Incorrect. The car cannot continue at its original speed after hitting a massive stationary object. Momentum is conserved, but mass increased, so velocity must decrease." + gresa},
                {t: wrong3, c:false, r:"Incorrect. They will continue moving North. There is no force present to make them bounce backward to the South." + gresa}
            ]
        };
    }
];

/* ================= STATE & LOGIC ================= */
let currentUser = "";
let userProgress = {};

const TOPICS = [
    { id: 'lom_c', name: 'Laws of Motion (Conceptual)', type: 'conceptual', data: lom_conceptual },
    { id: 'lom_ps', name: 'Laws of Motion (Problem Solving)', type: 'ps', data: lom_ps_gens },
    { id: 'wpe_c', name: 'Work, Power, and Energy (Conceptual)', type: 'conceptual', data: wpe_conceptual },
    { id: 'wpe_ps', name: 'Work, Power, and Energy (Problem Solving)', type: 'ps', data: wpe_ps_gens },
    { id: 'mi_c', name: 'Momentum and Impulse (Conceptual)', type: 'conceptual', data: mi_conceptual },
    { id: 'mi_ps', name: 'Momentum and Impulse (Problem Solving)', type: 'ps', data: mi_ps_gens }
];

let activeTopic = null;
let currentQuestionIndices = []; // for conceptual (shuffled indices)
let currentQIndex = 0; // conceptual index
let correctFirstTry = 0; // conceptual score track
let psQuestionsSolved = 0; // PS track

let currentQuestionRendered = null; // holds current question obj
let attemptedCurrent = false; // tracks if user has clicked an option for current Q yet

// Element references
const elLogin = document.getElementById('login-screen');
const elHome = document.getElementById('home-screen');
const elQuiz = document.getElementById('quiz-screen');
const elResult = document.getElementById('result-screen');

function login() {
    const userIn = document.getElementById('username-input').value.trim();
    if(userIn.length < 1) return alert('Please enter a valid username.');
    currentUser = userIn;
    
    let saved = localStorage.getItem('physics_reviewer_progress_' + currentUser);
    if(saved) {
        userProgress = JSON.parse(saved);
    } else {
        userProgress = {};
    }

    document.getElementById('display-username').innerText = currentUser;
    renderTopics();
    
    elLogin.classList.add('hidden');
    elHome.classList.remove('hidden');
}

function logout() {
    currentUser = "";
    userProgress = {};
    document.getElementById('username-input').value = "";
    elHome.classList.add('hidden');
    elLogin.classList.remove('hidden');
}

function saveProgress() {
    localStorage.setItem('physics_reviewer_progress_' + currentUser, JSON.stringify(userProgress));
}

function renderTopics() {
    const container = document.getElementById('topic-list');
    container.innerHTML = '';

    TOPICS.forEach(topic => {
        const btn = document.createElement('div');
        btn.className = 'topic-btn' + (userProgress[topic.id] ? ' completed' : '');
        btn.innerHTML = `<span>${topic.name}</span> <span class="check-icon">✓ Cleared</span>`;
        btn.onclick = () => startTopic(topic);
        container.appendChild(btn);
    });
}

function startTopic(topic) {
    activeTopic = topic;
    elHome.classList.add('hidden');
    elQuiz.classList.remove('hidden');
    document.getElementById('topic-title').innerText = topic.name;
    document.getElementById('finish-ps-btn').classList.add('hidden');
    
    if(topic.type === 'conceptual') {
        currentQIndex = 0;
        correctFirstTry = 0;
        // Randomize 15 questions
        let indices = Array.from({length: topic.data.length}, (_, i) => i);
        currentQuestionIndices = shuffle(indices).slice(0, 15);
        renderQuestion();
    } else {
        psQuestionsSolved = 0;
        renderQuestion();
    }
}

function renderQuestion() {
    attemptedCurrent = false;
    document.getElementById('feedback-container').classList.add('hidden');
    document.getElementById('next-btn').classList.add('hidden');

    let qData;
    if(activeTopic.type === 'conceptual') {
        document.getElementById('progress-text').innerText = `Question ${currentQIndex + 1} of 15`;
        qData = activeTopic.data[currentQuestionIndices[currentQIndex]];
    } else {
        document.getElementById('progress-text').innerText = `Problem Solving Practice (Solved: ${psQuestionsSolved})`;
        if(psQuestionsSolved >= 3) {
            document.getElementById('finish-ps-btn').classList.remove('hidden');
        }
        // Randomly pick a generator and generate
        let genFunc = activeTopic.data[randInt(0, activeTopic.data.length - 1)];
        qData = genFunc();
    }

    currentQuestionRendered = qData;
    document.getElementById('question-text').innerHTML = qData.q;
    
    const optsContainer = document.getElementById('options-container');
    optsContainer.innerHTML = '';
    
    let shuffledOpts = shuffle([...qData.opts]);
    
    shuffledOpts.forEach((opt, idx) => {
        let btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = formatDistractor(opt.t);
        btn.onclick = () => selectOption(btn, opt);
        optsContainer.appendChild(btn);
    });
}

function selectOption(btnElement, optData) {
    if(btnElement.disabled) return;
    
    const feedback = document.getElementById('feedback-container');
    feedback.classList.remove('hidden');
    feedback.innerHTML = optData.r;

    if(optData.c) {
        // Correct
        if(!attemptedCurrent) {
            if(activeTopic.type === 'conceptual') correctFirstTry++;
            else psQuestionsSolved++;
        }
        btnElement.classList.add('correct');
        feedback.className = 'feedback-box correct';
        
        // Disable all options
        let allBtns = document.getElementById('options-container').querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        
        document.getElementById('next-btn').classList.remove('hidden');
        if(activeTopic.type === 'ps' && psQuestionsSolved >= 3) {
            document.getElementById('finish-ps-btn').classList.remove('hidden');
            document.getElementById('progress-text').innerText = `Problem Solving Practice (Solved: ${psQuestionsSolved})`;
        }
    } else {
        // Wrong
        attemptedCurrent = true;
        btnElement.classList.add('wrong');
        btnElement.disabled = true; // disable this wrong option
        feedback.className = 'feedback-box wrong';
    }
}

function nextQuestion() {
    if(activeTopic.type === 'conceptual') {
        currentQIndex++;
        if(currentQIndex >= 15) {
            finishConceptual();
        } else {
            renderQuestion();
        }
    } else {
        renderQuestion();
    }
}

function finishConceptual() {
    elQuiz.classList.add('hidden');
    elResult.classList.remove('hidden');
    
    const msg = document.getElementById('result-message');
    if(correctFirstTry >= 9) {
        msg.innerHTML = `Great job! You scored <strong>${correctFirstTry}/15</strong> correctly on the first try.<br>Topic Cleared!`;
        msg.style.color = 'var(--success)';
        userProgress[activeTopic.id] = true;
        saveProgress();
    } else {
        msg.innerHTML = `You scored <strong>${correctFirstTry}/15</strong> correctly on the first try.<br>You need 9/15 to clear this topic. Please try again!`;
        msg.style.color = 'var(--danger)';
    }
}

function finishProblemSolving() {
    userProgress[activeTopic.id] = true;
    saveProgress();
    
    elQuiz.classList.add('hidden');
    elResult.classList.remove('hidden');
    
    const msg = document.getElementById('result-message');
    msg.innerHTML = `Excellent practice! You solved <strong>${psQuestionsSolved}</strong> problems successfully.<br>Topic Cleared!`;
    msg.style.color = 'var(--success)';
}

function returnHome() {
    elResult.classList.add('hidden');
    renderTopics();
    elHome.classList.remove('hidden');
}

// Ensure Enter key works on login
document.getElementById('username-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') login();
});
</script>
